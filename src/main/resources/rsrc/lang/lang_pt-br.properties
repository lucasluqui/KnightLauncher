# Error messages
error.invalid_dir="Você precisa colocar esse .jar dentro do seu diretório principal do Spiral Knights {0}"
error.game_launch="Não foi possível iniciar o jogo.\n\nÉ recomendado que você tente qualquer uma das soluções a seguir em qualquer ordem:\n- Na aba \"Jogo\" nas configurações do launcher pressione o botão de \"Carregar configurações recomendadas\".\n- Reduza a memória alocada na aba \"Jogo\" nas configurações do launcher.\n- Na aba \"Jogo\" nas configurações do launcher pressione o botão de \"Redefinir valores para o padrão\".\n- Faça outro patch da VM Java  na aba \"Jogo\" nas configurações do launcher.\n\nSe isso ainda não resolver o problema você pode buscar por suporte técnico no Discord.\n\nQuando for submeter um pedido de ajuda pelo Discord lembre-se de anexar TODOS os seus arquivos de logs com o pedido.\nVocê pode conseguir TODOS os seus registros automaticamente entrando nas Configurações do Launcher → Sobre → Copiar Logs para a área de transferência, e depois pressionar CTRL + V no Discord."
error.start_location="O arquivo .jar parece ter sido colocado no diretório errado.\nEm alguns casos isso acontece devido a um falso positivo e pode ser ignorado. O Knight Launcher tentará iniciar normalmente.\nSe isso persistir tente utilizar o arquivo Batch (KnightLauncher_windows.bat) para Windows\nou o arquivo Shell (KnightLauncher_mac_linux.sh) para OSX/Linux."
error.start_location_steam_path="\nAdicionalmente, nós detectamos o seguinte caminho para o Steam: \n{0}"
error.flamingo_offline="Não foi possível conectar ao Flamingo.\nAlgumas funcionalidades do launcher podem não estar totalmente disponíveis."
error.no_compatible_jvm="Nenhuma VM Java compatível para iniciar o editor com."
error.folders_within_mods_folder="Existem pastas dentro da pasta de mods.\nVocê não precisa extrair o arquivo .zip, apenas arraste o arquivo .zip para a pasta de mods."
error.unsupported_64bit="O seu sistema não tem suporte ao patching de 64-bits da MV Java."
error.not_supported="Não suportado."
error.mod_file_format="Apenas extensões de arquivo .zip, .jar e .modpack são suportadas, por favor tente novamente."
error.incompatible_mod="Pelo menos um mod incompatível foi encontrado. Todos eles serão automaticamente definidos como desativados.\nAtualize eles para poder restaurar sua funcionalidade."

