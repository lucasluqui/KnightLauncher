m.scene_editor_legacy_warning="Não utilize esse Editor de Cenas Legado para produzir conteúdo que você pretende submeter para o programa do Crucible do Coliseu. \nEm vez disso utilize o Editor do Crucible que pode ser acessado dentro do jogo. \n\nEsse editor Legado pode quebrar a qualquer momento e suporte futuro para ele não é garantido.\n\nVocê gostaria de proceder?"
m.crucible_editor_warning="O Editor do Crucible é mantido exclusivamente pela Grey Havens, e esse launcher não tem aprovação ou associação.\nIsso é simplesmente um atalho para acessar o mesmo editor que você acessaria no jogo.\n\nUtilizar o Editor do Crucible por fora do jogo não é oficialmente apoiado...\nCoisas podem ou não funcionar corretamente, use por sua conta em risco.\n\nQuaisquer criações que você fizer tem que obedecer com os Termos de Servido do Coliseum Crucible:\nhttps://wiki.spiralknights.com/Coliseum_Crucible_Terms_and_Conditions \n\nGaranta que quaisquer bugs que você pretende submeter podem ser reproduzidos no editor dentro do jogo.\n\nVocê gostaria de proceder?"
m.scheduled_maintenance_warning="Os servidores do jogo estão atualmente sob uma janela de manutenção.\nSua sessão do jogo pode sofrer interrupções, ou você pode não conseguir fazer o log in em geral.\n\nA manutenção acaba às: {0}. (isso é mostrado em seu horário local)\n\nO horário acima é uma estimativa oficial, mas sempre pode variar.\nPor favor verifique os fóruns do jogo para mais informações."
m.invalid_additional_args_warning="Um ou mais argumentos do JVM na sua configuração de Argumentos Adicionais (Extra.txt) foram vistos como inválidos.\n\nPor favor vá para Configurações → Avançado e verifique-as. Leia os registros do Knight Launcher para mais informações.\n\nTodas elas vão ser ignoradas para essa inicialização."
m.invalid_additional_args_save_warning="Um ou mais argumentos do JVM na sua configuração de Argumentos Adicionais (Extra.txt) foram vistos como inválidos, e eles foram forçadamente redefinidos para o padrão.\n\nPor favor vá para Configurações → Avançado e verifique-as. Leia os registros do Knight Launcher para mais informações."

